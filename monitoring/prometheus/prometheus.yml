global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: conluz-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["${APP_HOST}:${APP_API_PORT}"]

  - job_name: influxdb
    static_configs:
      - targets: ["${APP_HOST}:${INFLUXDB_PORT}"]

  - job_name: loki
    static_configs:
      - targets: ["${LOKI_HOST}:${LOKI_PORT}"]
